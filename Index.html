    // ── Components ────────────────────────────────────────────────
    function PlayerRow({ player, reverse }) {
      const pc = posColors[player.pos] || "#aaa";
      const sc = player.status === "active" ? NEON_GREEN : player.status === "questionable" ? NEON_YELLOW : NEON_PINK;
      return (
        <div className={`player-row ${reverse ? "rev" : ""}`}>
          <div className="pos-chip" style={{ color: pc, borderColor: pc, background: `${pc}11` }}>{player.pos}</div>
          <span className="player-name-text" style={{ textAlign: reverse ? "right" : "left" }}>{player.name}</span>
          <span className="player-score-text">{player.score}</span>
          <div className="status-pip" style={{ background: sc, boxShadow: `0 0 5px ${sc}` }} />
        </div>
      );
    }

    function DetailPanel({ league }) {
      const { matchup } = league;
      const winning = matchup.myTeam.score > matchup.opponent.score;
      return (
        <div>
          <div className="detail-header">
            <div className="detail-title">

    function LeagueCard({ league, isActive, onClick, index }) {
      const { matchup } = league;
      const winning = matchup.myTeam.score > matchup.opponent.score;
      const diff = Math.abs(matchup.myTeam.score - matchup.opponent.score).toFixed(1);
      const total = matchup.myTeam.score + matchup.opponent.score;
